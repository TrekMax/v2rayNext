name: Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: get ver
        run: |
          echo "$(cat v2ray.sh | grep ver=)" >> $GITHUB_ENV
          echo "old=$(git tag | tail -n1)" >> $GITHUB_ENV

      - name: zip
        run: zip -9vr V2rayNext_latest.zip . -x '.*'

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: V2rayNext_latest.zip
          tag_name: ${{ env.is_sh_ver }}